baseURL = "https://blamer.ch"
defaultContentLanguage = "en"
theme = "nomad-tech"

[pagination]
  pagerSize = 6

# -------------------------------------------------------------------
# ENGLISCH (Main Language - International Business)
# -------------------------------------------------------------------
[languages.en]
  languageCode = "en-US"
  contentDir = "content/en"
  # Titel optimiert für Google: Name + Dienstleistung
  title = "B74ME | Professional Penetration Testing & Web Security"
  weight = 1

  [languages.en.params]
    subtitle = "Offensive Security • Vulnerability Research • Security Audits"
    # Beschreibung für Firmen (Risikominimierung)
    description = "Providing high-impact penetration testing and security assessments to protect your digital assets before they are exploited."

    [[languages.en.params.portfolio]]
      title = "Web Application Security Audits"
      type = "Professional Services"
      icon = "🛡️"
      description = "In-depth security analysis of web architectures, identifying critical vulnerabilities and providing actionable remediation paths."
      tags = ["Pentesting", "Web Security", "OWASP"]
      project_url = "/posts/" # Verlinkt auf deine Writeups als Beweis

  [[languages.en.menu.main]]
    name = "Services" # NEU: Direktes Angebot für Kunden
    url = "/services/"
    weight = 1
  [[languages.en.menu.main]]
    name = "Writeups"
    url = "/posts/"
    weight = 2
  [[languages.en.menu.main]]
    name = "About"
    url = "/about/"
    weight = 3

# -------------------------------------------------------------------
# DEUTSCH (Lokalmarkt Schweiz/DACH)
# -------------------------------------------------------------------
[languages.de]
  languageCode = "de-CH"
  contentDir = "content/de"
  title = "B74ME | Penetration Testing & IT-Sicherheitsanalysen"
  weight = 2

  [languages.de.params]
    subtitle = "Offensive Sicherheit • Web-Security • Security Audits"
    description = "Professionelle Identifizierung von Sicherheitslücken und Schutz Ihrer IT-Infrastruktur durch ethisches Hacking."

    [[languages.de.params.portfolio]]
      title = "Sicherheitsprüfung für Webanwendungen"
      type = "Dienstleistung"
      icon = "🛡️"
      description = "Detaillierte Analyse von Web-Architekturen zur Vermeidung von Datenlecks und Cyberangriffen."
      tags = ["Pentesting", "IT-Security", "Compliance"]
      project_url = "/de/posts/"

  [[languages.de.menu.main]]
    name = "Services"
    url = "/de/services/"
    weight = 1
  [[languages.de.menu.main]]
    name = "Blog"
    url = "/de/posts/"
    weight = 2
  [[languages.de.menu.main]]
    name = "Über mich"
    url = "/de/about/"
    weight = 3

